    }
    fill(100);
    log(`완료 — 검침 ${DATA.readings.length}건, 보일러 ${DATA.boilers.length}건 이관됨. 앱을 새로고침해 확인하세요.`);
    this.textContent = "이관 완료 ✓";
  }catch(e){
    console.error(e);
    log("실패: " + (e.code||e.message) + " — 보안 규칙과 익명 로그인 설정을 확인하세요");
    this.disabled = false;
  }
};
</script>
